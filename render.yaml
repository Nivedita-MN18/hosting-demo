# render.yaml — Render Blueprint for TraceLite
# Docs: https://render.com/docs/blueprint-spec
#
# This deploys:
#   1. A managed PostgreSQL database
#   2. The TraceLite API as a Docker Web Service

services:
  # ── Managed PostgreSQL ───────────────────────────────────────────────────────
  - type: postgres
    name: tracelite-db
    plan: free
    databaseName: tracelite
    databaseUser: tracelite

  # ── Backend API (Docker) ────────────────────────────────────────────────────
  - type: web
    name: tracelite-api
    runtime: docker
    # Build context = backend/ subfolder inside the repo root
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /healthz

    envVars:
      # Render injects DATABASE_URL directly from the linked managed DB
      - key: DATABASE_URL
        fromDatabase:
          name: tracelite-db
          property: connectionString

      # Render auto-generates a random secret — copy from dashboard after deploy
      - key: TRACELITE_API_KEY
        generateValue: true

      - key: NODE_ENV
        value: production

      # PORT is injected by Render automatically — do NOT hardcode it here
      # The server.js already reads: process.env.PORT || 3001
