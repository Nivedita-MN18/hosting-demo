# render.yaml — TraceLite Blueprint
# Generated format: Render Blueprint v1
version: "1"
projects:
- name: TraceLite
  environments:
  - name: Production
    services:

    # ── Managed PostgreSQL ───────────────────────────────────────────────────
    - type: postgres
      name: tracelite-db
      plan: free
      databaseName: tracelite
      databaseUser: tracelite
      region: oregon

    # ── TraceLite API (Docker) ───────────────────────────────────────────────
    - type: web
      name: hosting-demo
      runtime: docker
      repo: https://github.com/Nivedita-MN18/hosting-demo
      plan: free
      region: oregon
      # The Dockerfile lives in backend/ — both context and path must point there
      dockerContext: ./backend
      dockerfilePath: ./backend/Dockerfile
      healthCheckPath: /healthz
      autoDeployTrigger: commit
      envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tracelite-db
          property: connectionString
      - key: TRACELITE_API_KEY
        generateValue: true
      - key: NODE_ENV
        value: production
