services:
  # Managed PostgreSQL — type: postgres is only valid in the flat services format
  - type: postgres
    name: tracelite-db
    plan: free
    region: oregon
    databaseName: tracelite
    databaseUser: tracelite

  # TraceLite REST API — Docker build from backend/ subfolder
  - type: web
    name: hosting-demo
    runtime: docker
    repo: https://github.com/Nivedita-MN18/hosting-demo
    plan: free
    region: oregon
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tracelite-db
          property: connectionString
      - key: TRACELITE_API_KEY
        generateValue: true
      - key: NODE_ENV
        value: production
