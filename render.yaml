# Render Blueprint — https://render.com/docs/blueprint-spec
# PostgreSQL must be defined under top-level "databases:", NOT as a service

databases:
  - name: tracelite-db
    plan: free
    region: oregon
    databaseName: tracelite
    user: tracelite

services:
  - type: web
    name: hosting-demo
    runtime: docker
    repo: https://github.com/Nivedita-MN18/hosting-demo
    plan: free
    region: oregon
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tracelite-db
          property: connectionString
      - key: TRACELITE_API_KEY
        generateValue: true
      - key: NODE_ENV
        value: production

