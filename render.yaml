# render.yaml — Render Blueprint for TraceLite
# Docs: https://render.com/docs/blueprint-spec
#
# This deploys:
#   1. A PostgreSQL database (managed by Render)
#   2. The TraceLite API as a Web Service (Docker-based)

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  - type: pserv
    name: tracelite-db
    plan: free
    databaseName: tracelite
    databaseUser: tracelite

  # ── Backend API (Docker) ────────────────────────────────────────────────────
  - type: web
    name: tracelite-api
    runtime: docker
    # Render builds from the repo root; point at the backend subfolder
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /healthz

    envVars:
      # Render injects DATABASE_URL automatically when you link the DB above.
      # Go to: Dashboard → tracelite-api → Environment → Add from Secret
      - key: DATABASE_URL
        fromDatabase:
          name: tracelite-db
          property: connectionString

      # Set TRACELITE_API_KEY in the Render dashboard under Environment → Secret Files
      # or add it here as a secret env var:
      - key: TRACELITE_API_KEY
        generateValue: true   # Render auto-generates a random secret on first deploy

      - key: NODE_ENV
        value: production

      - key: PORT
        value: 3001
